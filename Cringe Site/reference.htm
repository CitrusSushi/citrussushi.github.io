<img id=baka2 src=Walk.gif>
<script>
  baka2.style.position = "fixed";
  baka2.style.bottom = "0px";
  x = 0;
  step = 1;

  function walk() {
    baka2.style.left = x + "px";
    x += step;

    if (x > innerWidth - 48) {
      step = -1;
      baka2.style.transform = "scaleX(-1)"
    }

    else if (x < 0) {
      step = 1;
      baka2.style.transform = "scaleX(1)"
    }
  }

  setInterval(walk, 10)
</script>
