<img id=baka src=walk.gif>
<script>
  baka.style.position = "absolute";
  baka.style.bottom = "0px";
  x = 0;

  function walk() {
    baka.style.left = x + "px";
    x++;
    if (x > innerWidth - 48) x = innerWidth - 48
//  you can the boundary of which cishi loops;
//  splice up variable x & "px" so you dont have to edit then combine them together every so often
  }

  setInterval(walk, 10)
</script>
